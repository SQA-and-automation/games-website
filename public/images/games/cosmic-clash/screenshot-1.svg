<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <radialGradient id="ccs1-bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a0a20"/>
      <stop offset="100%" stop-color="#0A0A0F"/>
    </radialGradient>
    <radialGradient id="ccs1-explosion" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8"/>
      <stop offset="30%" stop-color="#FF00E5" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FF00E5" stop-opacity="0"/>
    </radialGradient>
    <filter id="ccs1-glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ccs1-strong">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Space background -->
  <rect width="1280" height="720" fill="url(#ccs1-bg)"/>

  <!-- Stars -->
  <g fill="#ffffff">
    <circle cx="100" cy="50" r="1.5" opacity="0.8"/><circle cx="250" cy="120" r="1" opacity="0.5"/>
    <circle cx="400" cy="30" r="1.2" opacity="0.6"/><circle cx="550" cy="90" r="1.8" opacity="0.7"/>
    <circle cx="700" cy="40" r="1" opacity="0.4"/><circle cx="850" cy="100" r="1.5" opacity="0.6"/>
    <circle cx="1000" cy="60" r="1.3" opacity="0.7"/><circle cx="1150" cy="80" r="1" opacity="0.5"/>
    <circle cx="150" cy="200" r="0.8" opacity="0.4"/><circle cx="300" cy="250" r="1.2" opacity="0.6"/>
    <circle cx="1100" cy="200" r="1" opacity="0.5"/><circle cx="50" cy="350" r="1.5" opacity="0.4"/>
    <circle cx="1200" cy="350" r="1.2" opacity="0.5"/><circle cx="200" cy="500" r="1" opacity="0.3"/>
    <circle cx="1050" cy="450" r="0.8" opacity="0.4"/><circle cx="350" cy="600" r="1.3" opacity="0.5"/>
    <circle cx="950" cy="550" r="1" opacity="0.4"/><circle cx="600" cy="650" r="1.5" opacity="0.3"/>
    <circle cx="800" cy="680" r="1" opacity="0.3"/><circle cx="450" cy="400" r="0.8" opacity="0.3"/>
  </g>

  <!-- Distant nebula -->
  <ellipse cx="900" cy="200" rx="200" ry="100" fill="#FF00E5" opacity="0.03"/>
  <ellipse cx="300" cy="500" rx="150" ry="80" fill="#FF00E5" opacity="0.02"/>

  <!-- Player ship (center-bottom) -->
  <g transform="translate(640, 550)" filter="url(#ccs1-strong)">
    <path d="M0,-40 L20,10 L12,25 L-12,25 L-20,10Z" fill="#FF00E5"/>
    <path d="M0,-40 L10,5 L0,15 L-10,5Z" fill="#ff60f0"/>
    <!-- Wings -->
    <path d="M-20,10 L-45,30 L-35,35 L-12,25Z" fill="#FF00E5" opacity="0.8"/>
    <path d="M20,10 L45,30 L35,35 L12,25Z" fill="#FF00E5" opacity="0.8"/>
    <!-- Engine glow -->
    <ellipse cx="0" cy="30" rx="8" ry="15" fill="#FF00E5" opacity="0.4"/>
    <ellipse cx="0" cy="30" rx="4" ry="10" fill="#ffffff" opacity="0.5"/>
  </g>

  <!-- Enemy ships -->
  <!-- Enemy 1 -->
  <g transform="translate(300, 180)" opacity="0.8">
    <path d="M0,30 L15,-10 L0,-25 L-15,-10Z" fill="#ff3333"/>
    <path d="M-15,-10 L-30,0 L-20,10Z" fill="#cc2222" opacity="0.7"/>
    <path d="M15,-10 L30,0 L20,10Z" fill="#cc2222" opacity="0.7"/>
  </g>
  <!-- Enemy 2 -->
  <g transform="translate(500, 120)" opacity="0.8">
    <path d="M0,30 L15,-10 L0,-25 L-15,-10Z" fill="#ff3333"/>
    <path d="M-15,-10 L-30,0 L-20,10Z" fill="#cc2222" opacity="0.7"/>
    <path d="M15,-10 L30,0 L20,10Z" fill="#cc2222" opacity="0.7"/>
  </g>
  <!-- Enemy 3 -->
  <g transform="translate(800, 150)" opacity="0.8">
    <path d="M0,30 L15,-10 L0,-25 L-15,-10Z" fill="#ff3333"/>
    <path d="M-15,-10 L-30,0 L-20,10Z" fill="#cc2222" opacity="0.7"/>
    <path d="M15,-10 L30,0 L20,10Z" fill="#cc2222" opacity="0.7"/>
  </g>
  <!-- Enemy 4 -->
  <g transform="translate(1000, 200)" opacity="0.6">
    <path d="M0,30 L15,-10 L0,-25 L-15,-10Z" fill="#ff3333"/>
    <path d="M-15,-10 L-30,0 L-20,10Z" fill="#cc2222" opacity="0.7"/>
    <path d="M15,-10 L30,0 L20,10Z" fill="#cc2222" opacity="0.7"/>
  </g>

  <!-- Player lasers -->
  <g filter="url(#ccs1-glow)">
    <line x1="633" y1="510" x2="633" y2="200" stroke="#FF00E5" stroke-width="3" opacity="0.8"/>
    <line x1="647" y1="510" x2="647" y2="200" stroke="#FF00E5" stroke-width="3" opacity="0.8"/>
    <line x1="633" y1="510" x2="490" y2="130" stroke="#FF00E5" stroke-width="2" opacity="0.5"/>
    <line x1="647" y1="510" x2="790" y2="160" stroke="#FF00E5" stroke-width="2" opacity="0.5"/>
  </g>

  <!-- Enemy lasers -->
  <g opacity="0.6">
    <line x1="300" y1="210" x2="580" y2="520" stroke="#ff3333" stroke-width="2"/>
    <line x1="800" y1="180" x2="700" y2="520" stroke="#ff3333" stroke-width="2"/>
  </g>

  <!-- Explosion where laser hits enemy -->
  <circle cx="500" cy="130" r="30" fill="url(#ccs1-explosion)" filter="url(#ccs1-strong)"/>

  <!-- Score and combo -->
  <g transform="translate(40, 20)">
    <text x="0" y="25" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="14" fill="#FF00E5" opacity="0.7">SCORE</text>
    <text x="0" y="55" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="30" fill="#FFFFFF">1,247,800</text>
  </g>

  <!-- Combo meter -->
  <g transform="translate(40, 80)">
    <text x="0" y="18" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="22" fill="#FF00E5" filter="url(#ccs1-glow)">x12 COMBO!</text>
  </g>

  <!-- Lives -->
  <g transform="translate(1140, 20)">
    <text x="0" y="18" font-family="Arial, sans-serif" font-size="12" fill="#FF00E5" opacity="0.7">LIVES</text>
    <g transform="translate(0, 25)" filter="url(#ccs1-glow)">
      <polygon points="10,0 15,8 10,16 5,8" fill="#FF00E5"/>
      <polygon points="30,0 35,8 30,16 25,8" fill="#FF00E5"/>
      <polygon points="50,0 55,8 50,16 45,8" fill="#FF00E5"/>
    </g>
  </g>

  <!-- Shield bar -->
  <g transform="translate(1060, 60)">
    <text x="0" y="12" font-family="Arial, sans-serif" font-size="11" fill="#00aaff">SHIELD</text>
    <rect x="0" y="18" width="180" height="10" rx="3" fill="#1a1a2e"/>
    <rect x="1" y="19" width="130" height="8" rx="2" fill="#00aaff" opacity="0.7"/>
  </g>

  <!-- Wave indicator -->
  <g transform="translate(540, 20)">
    <rect x="0" y="0" width="200" height="40" rx="8" fill="#0A0A0F" opacity="0.8" stroke="#FF00E5" stroke-width="1.5"/>
    <text x="100" y="17" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FF00E5" opacity="0.7">WAVE</text>
    <text x="100" y="35" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="16" fill="#FFFFFF">7 / 15</text>
  </g>

  <!-- Power-up indicator -->
  <g transform="translate(40, 640)">
    <rect x="0" y="0" width="50" height="50" rx="8" fill="#0A0A0F" opacity="0.7" stroke="#FF00E5" stroke-width="1.5"/>
    <text x="25" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#FF00E5">&#x26A1;</text>
    <rect x="60" y="0" width="50" height="50" rx="8" fill="#0A0A0F" opacity="0.7" stroke="#555" stroke-width="1"/>
    <text x="85" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#555">&#x25CE;</text>
    <rect x="120" y="0" width="50" height="50" rx="8" fill="#0A0A0F" opacity="0.7" stroke="#555" stroke-width="1"/>
    <text x="145" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#555">&#x2726;</text>
  </g>

  <!-- Weapon heat bar -->
  <g transform="translate(1060, 660)">
    <text x="0" y="12" font-family="Arial, sans-serif" font-size="11" fill="#ff6600">HEAT</text>
    <rect x="0" y="18" width="180" height="10" rx="3" fill="#1a1a2e"/>
    <rect x="1" y="19" width="80" height="8" rx="2" fill="#ff6600" opacity="0.6"/>
  </g>
</svg>