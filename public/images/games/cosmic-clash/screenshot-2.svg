<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <radialGradient id="ccs2-bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#200a25"/>
      <stop offset="100%" stop-color="#0A0A0F"/>
    </radialGradient>
    <radialGradient id="ccs2-boss" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF00E5" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FF00E5" stop-opacity="0"/>
    </radialGradient>
    <filter id="ccs2-glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ccs2-strong">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Space background -->
  <rect width="1280" height="720" fill="url(#ccs2-bg)"/>

  <!-- Stars -->
  <g fill="#ffffff">
    <circle cx="80" cy="80" r="1.2" opacity="0.6"/><circle cx="200" cy="40" r="1" opacity="0.4"/>
    <circle cx="350" cy="100" r="1.5" opacity="0.7"/><circle cx="500" cy="60" r="0.8" opacity="0.5"/>
    <circle cx="750" cy="50" r="1.3" opacity="0.6"/><circle cx="900" cy="90" r="1" opacity="0.4"/>
    <circle cx="1100" cy="70" r="1.5" opacity="0.7"/><circle cx="1220" cy="120" r="0.8" opacity="0.3"/>
    <circle cx="100" cy="600" r="1" opacity="0.3"/><circle cx="1180" cy="580" r="1.2" opacity="0.4"/>
    <circle cx="50" cy="450" r="0.8" opacity="0.3"/><circle cx="1230" cy="400" r="1" opacity="0.3"/>
  </g>

  <!-- Boss ship - massive -->
  <g transform="translate(640, 200)">
    <!-- Boss aura -->
    <circle cx="0" cy="0" r="200" fill="url(#ccs2-boss)"/>
    <!-- Main hull -->
    <path d="M-180,0 L-120,-60 L120,-60 L180,0 L120,60 L-120,60Z" fill="#1a0020" stroke="#FF00E5" stroke-width="2" opacity="0.8"/>
    <!-- Central core -->
    <circle cx="0" cy="0" r="40" fill="#1a0020" stroke="#FF00E5" stroke-width="2"/>
    <circle cx="0" cy="0" r="25" fill="#FF00E5" opacity="0.2"/>
    <circle cx="0" cy="0" r="12" fill="#FF00E5" opacity="0.5" filter="url(#ccs2-glow)">
      <animate attributeName="r" values="10;15;10" dur="2s" repeatCount="indefinite"/>
    </circle>
    <!-- Wing cannons -->
    <rect x="-160" y="-10" width="30" height="20" rx="4" fill="#FF00E5" opacity="0.4"/>
    <rect x="130" y="-10" width="30" height="20" rx="4" fill="#FF00E5" opacity="0.4"/>
    <!-- Upper turrets -->
    <circle cx="-80" cy="-40" r="12" fill="#1a0020" stroke="#FF00E5" stroke-width="1.5"/>
    <circle cx="80" cy="-40" r="12" fill="#1a0020" stroke="#FF00E5" stroke-width="1.5"/>
    <circle cx="0" cy="-55" r="10" fill="#1a0020" stroke="#FF00E5" stroke-width="1.5"/>
    <!-- Lower structures -->
    <rect x="-100" y="30" width="40" height="25" rx="3" fill="#1a0020" stroke="#FF00E5" stroke-width="1" opacity="0.6"/>
    <rect x="60" y="30" width="40" height="25" rx="3" fill="#1a0020" stroke="#FF00E5" stroke-width="1" opacity="0.6"/>
    <!-- Glow lines -->
    <line x1="-120" y1="0" x2="-50" y2="0" stroke="#FF00E5" stroke-width="1" opacity="0.3"/>
    <line x1="50" y1="0" x2="120" y2="0" stroke="#FF00E5" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- Boss health bar -->
  <g transform="translate(240, 30)">
    <rect x="0" y="0" width="800" height="35" rx="6" fill="#0A0A0F" opacity="0.9" stroke="#FF00E5" stroke-width="2"/>
    <rect x="3" y="3" width="500" height="29" rx="4" fill="#FF00E5" opacity="0.5"/>
    <rect x="3" y="3" width="500" height="15" rx="4" fill="#FF00E5" opacity="0.2"/>
    <text x="400" y="23" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="16" fill="#FFFFFF">VOID DREADNOUGHT - 62%</text>
  </g>

  <!-- Boss attack pattern - spread shot -->
  <g filter="url(#ccs2-glow)" opacity="0.7">
    <line x1="640" y1="260" x2="300" y2="600" stroke="#ff3333" stroke-width="3"/>
    <line x1="640" y1="260" x2="450" y2="620" stroke="#ff3333" stroke-width="3"/>
    <line x1="640" y1="260" x2="600" y2="640" stroke="#ff3333" stroke-width="3"/>
    <line x1="640" y1="260" x2="680" y2="640" stroke="#ff3333" stroke-width="3"/>
    <line x1="640" y1="260" x2="830" y2="620" stroke="#ff3333" stroke-width="3"/>
    <line x1="640" y1="260" x2="980" y2="600" stroke="#ff3333" stroke-width="3"/>
  </g>

  <!-- Bullet hell pattern from turrets -->
  <g fill="#ff6666" opacity="0.6">
    <circle cx="520" cy="320" r="4"/><circle cx="480" cy="380" r="4"/>
    <circle cx="540" cy="440" r="4"/><circle cx="500" cy="500" r="4"/>
    <circle cx="760" cy="320" r="4"/><circle cx="800" cy="380" r="4"/>
    <circle cx="740" cy="440" r="4"/><circle cx="780" cy="500" r="4"/>
    <circle cx="600" cy="350" r="3"/><circle cx="680" cy="350" r="3"/>
    <circle cx="620" cy="410" r="3"/><circle cx="660" cy="410" r="3"/>
  </g>

  <!-- Player ship dodging -->
  <g transform="translate(380, 580)" filter="url(#ccs2-strong)">
    <path d="M0,-30 L15,8 L8,18 L-8,18 L-15,8Z" fill="#FF00E5"/>
    <path d="M0,-30 L7,3 L0,10 L-7,3Z" fill="#ff60f0"/>
    <path d="M-15,8 L-32,22 L-25,26 L-8,18Z" fill="#FF00E5" opacity="0.8"/>
    <path d="M15,8 L32,22 L25,26 L8,18Z" fill="#FF00E5" opacity="0.8"/>
    <ellipse cx="0" cy="22" rx="5" ry="10" fill="#FF00E5" opacity="0.4"/>
  </g>

  <!-- Player shooting at boss -->
  <g filter="url(#ccs2-glow)">
    <line x1="375" y1="550" x2="560" y2="210" stroke="#FF00E5" stroke-width="2.5"/>
    <line x1="385" y1="550" x2="570" y2="210" stroke="#FF00E5" stroke-width="2.5"/>
  </g>

  <!-- Hit sparks on boss -->
  <g transform="translate(565, 210)" filter="url(#ccs2-strong)">
    <circle cx="0" cy="0" r="15" fill="#ffffff" opacity="0.6"/>
    <circle cx="0" cy="0" r="8" fill="#FF00E5" opacity="0.8"/>
  </g>

  <!-- Score -->
  <g transform="translate(40, 30)">
    <text x="0" y="20" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="12" fill="#FF00E5" opacity="0.7">SCORE</text>
    <text x="0" y="48" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="26" fill="#FFFFFF">3,891,200</text>
  </g>

  <!-- Boss phase indicator -->
  <g transform="translate(540, 80)">
    <rect x="0" y="0" width="200" height="30" rx="4" fill="#0A0A0F" opacity="0.8" stroke="#FF00E5" stroke-width="1"/>
    <text x="100" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="13" fill="#FF00E5">PHASE 2 - SPREAD SHOT</text>
  </g>

  <!-- Shield -->
  <g transform="translate(1060, 580)">
    <text x="0" y="12" font-family="Arial, sans-serif" font-size="11" fill="#00aaff">SHIELD</text>
    <rect x="0" y="18" width="180" height="10" rx="3" fill="#1a1a2e"/>
    <rect x="1" y="19" width="60" height="8" rx="2" fill="#00aaff" opacity="0.7"/>
  </g>

  <!-- Lives -->
  <g transform="translate(1150, 30)">
    <text x="0" y="14" font-family="Arial, sans-serif" font-size="11" fill="#FF00E5" opacity="0.7">LIVES</text>
    <g transform="translate(0, 20)" filter="url(#ccs2-glow)">
      <polygon points="8,0 12,6 8,12 4,6" fill="#FF00E5"/>
      <polygon points="24,0 28,6 24,12 20,6" fill="#FF00E5"/>
    </g>
  </g>

  <!-- Bomb counter -->
  <g transform="translate(40, 650)">
    <rect x="0" y="0" width="45" height="45" rx="8" fill="#0A0A0F" opacity="0.7" stroke="#ffaa00" stroke-width="1.5"/>
    <text x="22" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-weight="900" font-size="22" fill="#ffaa00">2</text>
    <text x="55" y="30" font-family="Arial, sans-serif" font-size="11" fill="#ffaa00">BOMBS</text>
  </g>

  <!-- Warning text -->
  <text x="640" y="700" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="18" fill="#ff3333" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="1s" repeatCount="indefinite"/>
    WARNING: BOSS ENRAGE IN 30s
  </text>
</svg>