<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <radialGradient id="ccs3-bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#150a1a"/>
      <stop offset="100%" stop-color="#0A0A0F"/>
    </radialGradient>
    <filter id="ccs3-glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="ccs3-accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff60f0"/>
      <stop offset="100%" stop-color="#FF00E5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#ccs3-bg)"/>

  <!-- Stars (subtle) -->
  <g fill="#ffffff" opacity="0.3">
    <circle cx="100" cy="100" r="1"/><circle cx="300" cy="60" r="0.8"/>
    <circle cx="500" cy="130" r="1.2"/><circle cx="700" cy="40" r="0.8"/>
    <circle cx="900" cy="110" r="1"/><circle cx="1100" cy="80" r="1.2"/>
    <circle cx="200" cy="300" r="0.8"/><circle cx="1050" cy="350" r="1"/>
    <circle cx="150" cy="500" r="1"/><circle cx="1150" cy="500" r="0.8"/>
  </g>

  <!-- Ship Upgrade / Hangar screen -->

  <!-- Header -->
  <rect x="0" y="0" width="1280" height="60" fill="#0A0A0F" opacity="0.9"/>
  <text x="640" y="40" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="26" fill="#FF00E5" filter="url(#ccs3-glow)" letter-spacing="3">SHIP HANGAR</text>

  <!-- Credits display -->
  <g transform="translate(1050, 15)">
    <rect x="0" y="0" width="180" height="32" rx="4" fill="#1a0a1f" stroke="#FF00E5" stroke-width="1"/>
    <text x="20" y="22" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#FF00E5">&#x25C8; 24,500</text>
  </g>

  <!-- Main ship display -->
  <g transform="translate(440, 80)">
    <rect x="0" y="0" width="400" height="350" rx="16" fill="#0d0a18" opacity="0.7" stroke="#FF00E5" stroke-width="1.5"/>

    <!-- Ship name -->
    <text x="200" y="35" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="20" fill="#FFFFFF">NEBULA STRIKER MK-III</text>
    <text x="200" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FF00E5" opacity="0.7">ASSAULT CLASS</text>

    <!-- Large ship render -->
    <g transform="translate(200, 180)">
      <path d="M0,-70 L30,15 L18,40 L-18,40 L-30,15Z" fill="#FF00E5" opacity="0.8"/>
      <path d="M0,-70 L15,5 L0,20 L-15,5Z" fill="#ff80f0"/>
      <path d="M-30,15 L-60,45 L-45,50 L-18,40Z" fill="#FF00E5" opacity="0.6"/>
      <path d="M30,15 L60,45 L45,50 L18,40Z" fill="#FF00E5" opacity="0.6"/>
      <circle cx="0" cy="-20" r="6" fill="#ffffff" opacity="0.4"/>
      <ellipse cx="0" cy="45" rx="10" ry="18" fill="#FF00E5" opacity="0.3"/>
    </g>

    <!-- Rarity stars -->
    <g transform="translate(140, 290)" filter="url(#ccs3-glow)">
      <polygon points="10,0 13,7 20,7 14,12 17,20 10,15 3,20 6,12 0,7 7,7" fill="#ffdd00"/>
      <polygon points="35,0 38,7 45,7 39,12 42,20 35,15 28,20 31,12 25,7 32,7" fill="#ffdd00"/>
      <polygon points="60,0 63,7 70,7 64,12 67,20 60,15 53,20 56,12 50,7 57,7" fill="#ffdd00"/>
      <polygon points="85,0 88,7 95,7 89,12 92,20 85,15 78,20 81,12 75,7 82,7" fill="#ffdd00"/>
      <polygon points="110,0 113,7 120,7 114,12 117,20 110,15 103,20 106,12 100,7 107,7" fill="#555"/>
    </g>
  </g>

  <!-- Ship selection thumbnails (left side) -->
  <g transform="translate(40, 80)">
    <!-- Selected ship -->
    <rect x="0" y="0" width="360" height="70" rx="8" fill="#1a0a1f" stroke="#FF00E5" stroke-width="2"/>
    <rect x="8" y="8" width="54" height="54" rx="6" fill="#FF00E5" opacity="0.15"/>
    <polygon points="35,18 42,38 28,38" fill="#FF00E5" opacity="0.5"/>
    <text x="75" y="30" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#FFFFFF">Nebula Striker MK-III</text>
    <text x="75" y="50" font-family="Arial, sans-serif" font-size="11" fill="#FF00E5" opacity="0.7">Assault | Level 8</text>

    <!-- Other ships -->
    <rect x="0" y="85" width="360" height="70" rx="8" fill="#0d0a18" stroke="#444" stroke-width="1"/>
    <rect x="8" y="93" width="54" height="54" rx="6" fill="#333" opacity="0.3"/>
    <text x="75" y="115" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#888">Void Phantom</text>
    <text x="75" y="135" font-family="Arial, sans-serif" font-size="11" fill="#666">Stealth | Level 5</text>

    <rect x="0" y="170" width="360" height="70" rx="8" fill="#0d0a18" stroke="#444" stroke-width="1"/>
    <rect x="8" y="178" width="54" height="54" rx="6" fill="#333" opacity="0.3"/>
    <text x="75" y="200" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#888">Solar Guardian</text>
    <text x="75" y="220" font-family="Arial, sans-serif" font-size="11" fill="#666">Tank | Level 3</text>

    <rect x="0" y="255" width="360" height="70" rx="8" fill="#0d0a18" stroke="#444" stroke-width="1"/>
    <rect x="8" y="263" width="54" height="54" rx="6" fill="#333" opacity="0.3"/>
    <text x="75" y="285" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#888">Ion Raptor</text>
    <text x="75" y="305" font-family="Arial, sans-serif" font-size="11" fill="#666">Speed | Level 6</text>

    <!-- Locked ship -->
    <rect x="0" y="340" width="360" height="70" rx="8" fill="#0a0a10" stroke="#333" stroke-width="1" opacity="0.5"/>
    <text x="180" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#444">Reach Wave 20 to Unlock</text>
  </g>

  <!-- Stats panel (right side) -->
  <g transform="translate(880, 80)">
    <rect x="0" y="0" width="360" height="350" rx="12" fill="#0d0a18" opacity="0.8" stroke="#FF00E5" stroke-width="1.5"/>
    <text x="20" y="35" font-family="Arial, sans-serif" font-weight="700" font-size="16" fill="#FF00E5">SHIP STATS</text>

    <!-- Stat bars -->
    <g transform="translate(20, 55)">
      <text x="0" y="15" font-family="Arial, sans-serif" font-size="13" fill="#FFFFFF">Firepower</text>
      <rect x="100" y="4" width="220" height="14" rx="3" fill="#1a1a2e"/>
      <rect x="101" y="5" width="175" height="12" rx="2" fill="#FF00E5" opacity="0.7"/>

      <text x="0" y="45" font-family="Arial, sans-serif" font-size="13" fill="#FFFFFF">Speed</text>
      <rect x="100" y="34" width="220" height="14" rx="3" fill="#1a1a2e"/>
      <rect x="101" y="35" width="140" height="12" rx="2" fill="#FF00E5" opacity="0.7"/>

      <text x="0" y="75" font-family="Arial, sans-serif" font-size="13" fill="#FFFFFF">Shield</text>
      <rect x="100" y="64" width="220" height="14" rx="3" fill="#1a1a2e"/>
      <rect x="101" y="65" width="110" height="12" rx="2" fill="#00aaff" opacity="0.7"/>

      <text x="0" y="105" font-family="Arial, sans-serif" font-size="13" fill="#FFFFFF">Energy</text>
      <rect x="100" y="94" width="220" height="14" rx="3" fill="#1a1a2e"/>
      <rect x="101" y="95" width="160" height="12" rx="2" fill="#ffaa00" opacity="0.7"/>

      <text x="0" y="135" font-family="Arial, sans-serif" font-size="13" fill="#FFFFFF">Special</text>
      <rect x="100" y="124" width="220" height="14" rx="3" fill="#1a1a2e"/>
      <rect x="101" y="125" width="190" height="12" rx="2" fill="#39FF14" opacity="0.7"/>
    </g>

    <!-- Abilities -->
    <line x1="20" y1="210" x2="340" y2="210" stroke="#FF00E5" stroke-width="0.5" opacity="0.3"/>
    <text x="20" y="235" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#FF00E5">ABILITIES</text>
    <g transform="translate(20, 250)">
      <rect x="0" y="0" width="40" height="40" rx="6" fill="#1a1530" stroke="#FF00E5" stroke-width="1.5"/>
      <text x="20" y="26" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#FF00E5">&#x26A1;</text>
      <text x="50" y="15" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF">Plasma Burst</text>
      <text x="50" y="30" font-family="Arial, sans-serif" font-size="10" fill="#888">360-degree energy wave</text>
    </g>
    <g transform="translate(20, 300)">
      <rect x="0" y="0" width="40" height="40" rx="6" fill="#1a1530" stroke="#ffaa00" stroke-width="1.5"/>
      <text x="20" y="26" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#ffaa00">&#x25CE;</text>
      <text x="50" y="15" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF">Phase Shift</text>
      <text x="50" y="30" font-family="Arial, sans-serif" font-size="10" fill="#888">Temporary invincibility</text>
    </g>
  </g>

  <!-- Upgrade panel bottom -->
  <g transform="translate(40, 460)">
    <rect x="0" y="0" width="1200" height="190" rx="12" fill="#0d0a18" opacity="0.8" stroke="#FF00E5" stroke-width="1.5"/>
    <text x="20" y="30" font-family="Arial, sans-serif" font-weight="700" font-size="16" fill="#FF00E5">UPGRADES</text>

    <!-- Upgrade slots -->
    <g transform="translate(20, 45)">
      <!-- Weapons -->
      <rect x="0" y="0" width="220" height="120" rx="8" fill="#1a0a1f" stroke="#FF00E5" stroke-width="1.5"/>
      <text x="15" y="25" font-family="Arial, sans-serif" font-weight="700" font-size="13" fill="#FFFFFF">Twin Plasma Cannons</text>
      <text x="15" y="45" font-family="Arial, sans-serif" font-size="11" fill="#FF00E5">DMG: 45 | ROF: 8.5/s</text>
      <rect x="15" y="55" width="190" height="8" rx="2" fill="#1a1a2e"/>
      <rect x="15" y="55" width="150" height="8" rx="2" fill="#FF00E5" opacity="0.5"/>
      <text x="15" y="80" font-family="Arial, sans-serif" font-size="11" fill="#888">Level 6 / 10</text>
      <rect x="15" y="90" width="190" height="26" rx="4" fill="#FF00E5" opacity="0.2" stroke="#FF00E5" stroke-width="1"/>
      <text x="110" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="12" fill="#FF00E5">UPGRADE - 3,200 &#x25C8;</text>

      <!-- Engine -->
      <rect x="240" y="0" width="220" height="120" rx="8" fill="#1a0a1f" stroke="#ffaa00" stroke-width="1.5"/>
      <text x="255" y="25" font-family="Arial, sans-serif" font-weight="700" font-size="13" fill="#FFFFFF">Quantum Drive</text>
      <text x="255" y="45" font-family="Arial, sans-serif" font-size="11" fill="#ffaa00">SPD: +40% | BOOST: 3s</text>
      <rect x="255" y="55" width="190" height="8" rx="2" fill="#1a1a2e"/>
      <rect x="255" y="55" width="100" height="8" rx="2" fill="#ffaa00" opacity="0.5"/>
      <text x="255" y="80" font-family="Arial, sans-serif" font-size="11" fill="#888">Level 4 / 10</text>
      <rect x="255" y="90" width="190" height="26" rx="4" fill="#ffaa00" opacity="0.2" stroke="#ffaa00" stroke-width="1"/>
      <text x="350" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="12" fill="#ffaa00">UPGRADE - 2,800 &#x25C8;</text>

      <!-- Shield module -->
      <rect x="480" y="0" width="220" height="120" rx="8" fill="#1a0a1f" stroke="#00aaff" stroke-width="1.5"/>
      <text x="495" y="25" font-family="Arial, sans-serif" font-weight="700" font-size="13" fill="#FFFFFF">Prismatic Shield</text>
      <text x="495" y="45" font-family="Arial, sans-serif" font-size="11" fill="#00aaff">DEF: 200 | REGEN: 5/s</text>
      <rect x="495" y="55" width="190" height="8" rx="2" fill="#1a1a2e"/>
      <rect x="495" y="55" width="70" height="8" rx="2" fill="#00aaff" opacity="0.5"/>
      <text x="495" y="80" font-family="Arial, sans-serif" font-size="11" fill="#888">Level 3 / 10</text>
      <rect x="495" y="90" width="190" height="26" rx="4" fill="#00aaff" opacity="0.2" stroke="#00aaff" stroke-width="1"/>
      <text x="590" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="12" fill="#00aaff">UPGRADE - 2,200 &#x25C8;</text>

      <!-- Special -->
      <rect x="720" y="0" width="220" height="120" rx="8" fill="#1a0a1f" stroke="#39FF14" stroke-width="1.5"/>
      <text x="735" y="25" font-family="Arial, sans-serif" font-weight="700" font-size="13" fill="#FFFFFF">Plasma Burst</text>
      <text x="735" y="45" font-family="Arial, sans-serif" font-size="11" fill="#39FF14">DMG: 500 | CD: 15s</text>
      <rect x="735" y="55" width="190" height="8" rx="2" fill="#1a1a2e"/>
      <rect x="735" y="55" width="130" height="8" rx="2" fill="#39FF14" opacity="0.5"/>
      <text x="735" y="80" font-family="Arial, sans-serif" font-size="11" fill="#888">Level 5 / 10</text>
      <rect x="735" y="90" width="190" height="26" rx="4" fill="#39FF14" opacity="0.2" stroke="#39FF14" stroke-width="1"/>
      <text x="830" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="12" fill="#39FF14">UPGRADE - 4,100 &#x25C8;</text>
    </g>
  </g>

  <!-- Bottom nav -->
  <rect x="0" y="670" width="1280" height="50" fill="#0A0A0F" opacity="0.9"/>
  <g font-family="Arial, sans-serif" font-size="13" fill="#666">
    <text x="200" y="700" text-anchor="middle">PLAY</text>
    <text x="440" y="700" text-anchor="middle" fill="#FF00E5">HANGAR</text>
    <text x="640" y="700" text-anchor="middle">MISSIONS</text>
    <text x="860" y="700" text-anchor="middle">LEADERBOARD</text>
    <text x="1080" y="700" text-anchor="middle">SHOP</text>
  </g>
  <rect x="405" y="690" width="70" height="3" rx="1" fill="#FF00E5"/>
</svg>