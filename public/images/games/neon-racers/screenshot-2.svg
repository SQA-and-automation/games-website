<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="nrs2-sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#050510"/>
      <stop offset="100%" stop-color="#0a1535"/>
    </linearGradient>
    <linearGradient id="nrs2-bridge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F0FF" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#00F0FF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00F0FF" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="nrs2-glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="nrs2-strong">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="1280" height="720" fill="url(#nrs2-sky)"/>

  <!-- Distant city glow -->
  <ellipse cx="640" cy="300" rx="500" ry="80" fill="#00F0FF" opacity="0.04"/>

  <!-- Suspension bridge -->
  <g stroke="#00F0FF" fill="none" opacity="0.5">
    <!-- Towers -->
    <rect x="340" y="150" width="12" height="250" fill="#00F0FF" opacity="0.3"/>
    <rect x="928" y="150" width="12" height="250" fill="#00F0FF" opacity="0.3"/>
    <!-- Main cables -->
    <path d="M0,200 Q346,320 346,160" stroke-width="2"/>
    <path d="M346,160 Q640,300 934,160" stroke-width="2"/>
    <path d="M934,160 Q934,320 1280,200" stroke-width="2"/>
    <!-- Suspension cables -->
    <line x1="346" y1="180" x2="346" y2="400" stroke-width="1" opacity="0.3"/>
    <line x1="440" y1="230" x2="440" y2="400" stroke-width="1" opacity="0.3"/>
    <line x1="540" y1="265" x2="540" y2="400" stroke-width="1" opacity="0.3"/>
    <line x1="640" y1="280" x2="640" y2="400" stroke-width="1" opacity="0.3"/>
    <line x1="740" y1="265" x2="740" y2="400" stroke-width="1" opacity="0.3"/>
    <line x1="840" y1="230" x2="840" y2="400" stroke-width="1" opacity="0.3"/>
    <line x1="934" y1="180" x2="934" y2="400" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- Bridge deck / road -->
  <rect x="0" y="390" width="1280" height="180" fill="#0d0d1a"/>
  <rect x="0" y="390" width="1280" height="4" fill="#00F0FF" opacity="0.4" filter="url(#nrs2-glow)"/>

  <!-- Lane markings -->
  <g fill="#00F0FF" opacity="0.3">
    <rect x="100" y="478" width="60" height="4" rx="2"/>
    <rect x="220" y="478" width="60" height="4" rx="2"/>
    <rect x="340" y="478" width="60" height="4" rx="2"/>
    <rect x="460" y="478" width="60" height="4" rx="2"/>
    <rect x="580" y="478" width="60" height="4" rx="2"/>
    <rect x="700" y="478" width="60" height="4" rx="2"/>
    <rect x="820" y="478" width="60" height="4" rx="2"/>
    <rect x="940" y="478" width="60" height="4" rx="2"/>
    <rect x="1060" y="478" width="60" height="4" rx="2"/>
    <rect x="1180" y="478" width="60" height="4" rx="2"/>
  </g>

  <!-- Road edge lines -->
  <rect x="0" y="570" width="1280" height="3" fill="#00F0FF" opacity="0.3"/>

  <!-- Cars on road -->
  <!-- Player car -->
  <g transform="translate(550, 430)" filter="url(#nrs2-strong)">
    <rect x="0" y="0" width="50" height="90" rx="10" fill="#00F0FF"/>
    <rect x="5" y="5" width="40" height="30" rx="5" fill="#005566"/>
    <rect x="10" y="80" width="10" height="8" rx="2" fill="#ffffff"/>
    <rect x="30" y="80" width="10" height="8" rx="2" fill="#ffffff"/>
  </g>

  <!-- Opponent car 1 -->
  <g transform="translate(750, 420)" opacity="0.7">
    <rect x="0" y="0" width="40" height="70" rx="8" fill="#ff4444"/>
    <rect x="5" y="60" width="8" height="6" rx="1" fill="#ffaa00"/>
    <rect x="27" y="60" width="8" height="6" rx="1" fill="#ffaa00"/>
  </g>

  <!-- Opponent car 2 -->
  <g transform="translate(350, 410)" opacity="0.5">
    <rect x="0" y="0" width="35" height="60" rx="7" fill="#ffaa00"/>
    <rect x="4" y="52" width="7" height="5" rx="1" fill="#ff6600"/>
    <rect x="24" y="52" width="7" height="5" rx="1" fill="#ff6600"/>
  </g>

  <!-- Water reflection below bridge -->
  <rect x="0" y="570" width="1280" height="150" fill="#050520"/>
  <g opacity="0.15">
    <rect x="330" y="580" width="14" height="100" fill="#00F0FF"/>
    <rect x="920" y="580" width="14" height="100" fill="#00F0FF"/>
    <rect x="540" y="590" width="50" height="60" fill="#00F0FF" opacity="0.3"/>
  </g>

  <!-- HUD Elements -->
  <!-- Speed gauge -->
  <g transform="translate(1050, 600)">
    <rect x="0" y="0" width="190" height="80" rx="10" fill="#0A0A0F" opacity="0.8" stroke="#00F0FF" stroke-width="1.5"/>
    <text x="15" y="28" font-family="Arial, sans-serif" font-size="12" fill="#00F0FF" opacity="0.7">SPEED</text>
    <text x="15" y="60" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="30" fill="#00F0FF">312 km/h</text>
  </g>

  <!-- Timer -->
  <g transform="translate(540, 20)">
    <rect x="0" y="0" width="200" height="50" rx="8" fill="#0A0A0F" opacity="0.8" stroke="#00F0FF" stroke-width="1.5"/>
    <text x="100" y="35" text-anchor="middle" font-family="'Courier New', monospace" font-weight="700" font-size="26" fill="#FFFFFF">02:34.78</text>
  </g>

  <!-- Position -->
  <g transform="translate(40, 20)">
    <rect x="0" y="0" width="80" height="50" rx="8" fill="#0A0A0F" opacity="0.8" stroke="#00F0FF" stroke-width="1.5"/>
    <text x="40" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#00F0FF">POS</text>
    <text x="40" y="42" text-anchor="middle" font-family="Arial Black, sans-serif" font-weight="900" font-size="22" fill="#FFFFFF">2nd</text>
  </g>

  <!-- Boost meter -->
  <g transform="translate(40, 600)">
    <text x="0" y="12" font-family="Arial, sans-serif" font-size="11" fill="#00F0FF">BOOST</text>
    <rect x="0" y="18" width="250" height="12" rx="4" fill="#0A0A0F" opacity="0.7" stroke="#00F0FF" stroke-width="1"/>
    <rect x="2" y="20" width="180" height="8" rx="3" fill="#00F0FF" opacity="0.8"/>
  </g>
</svg>