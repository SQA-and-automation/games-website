<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="pl-bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0f1a0f"/>
      <stop offset="100%" stop-color="#0A0A0F"/>
    </radialGradient>
    <linearGradient id="pl-accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#70ff50"/>
      <stop offset="100%" stop-color="#39FF14"/>
    </linearGradient>
    <linearGradient id="pl-dark-green" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#39FF14"/>
      <stop offset="100%" stop-color="#1a8a0a"/>
    </linearGradient>
    <filter id="pl-glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="pl-soft">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#pl-bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.1" stroke="#39FF14" stroke-width="1">
    <line x1="96" y1="0" x2="96" y2="512"/><line x1="160" y1="0" x2="160" y2="512"/>
    <line x1="224" y1="0" x2="224" y2="512"/><line x1="288" y1="0" x2="288" y2="512"/>
    <line x1="352" y1="0" x2="352" y2="512"/><line x1="416" y1="0" x2="416" y2="512"/>
    <line x1="0" y1="96" x2="512" y2="96"/><line x1="0" y1="160" x2="512" y2="160"/>
    <line x1="0" y1="224" x2="512" y2="224"/><line x1="0" y1="288" x2="512" y2="288"/>
    <line x1="0" y1="352" x2="512" y2="352"/><line x1="0" y1="416" x2="512" y2="416"/>
  </g>

  <!-- Ambient glow -->
  <circle cx="256" cy="210" r="120" fill="#39FF14" opacity="0.06" filter="url(#pl-soft)"/>

  <!-- Pixel sword (made of squares) -->
  <g filter="url(#pl-glow)">
    <!-- Blade -->
    <rect x="244" y="80" width="24" height="24" fill="#39FF14"/>
    <rect x="244" y="104" width="24" height="24" fill="#39FF14"/>
    <rect x="244" y="128" width="24" height="24" fill="#39FF14"/>
    <rect x="244" y="152" width="24" height="24" fill="#39FF14"/>
    <rect x="244" y="176" width="24" height="24" fill="#2dd912"/>
    <rect x="244" y="200" width="24" height="24" fill="#2dd912"/>
    <!-- Cross guard -->
    <rect x="196" y="224" width="24" height="24" fill="#70ff50"/>
    <rect x="220" y="224" width="24" height="24" fill="#39FF14"/>
    <rect x="244" y="224" width="24" height="24" fill="#39FF14"/>
    <rect x="268" y="224" width="24" height="24" fill="#39FF14"/>
    <rect x="292" y="224" width="24" height="24" fill="#70ff50"/>
    <!-- Handle -->
    <rect x="244" y="248" width="24" height="24" fill="#8B6914"/>
    <rect x="244" y="272" width="24" height="24" fill="#6B4914"/>
    <!-- Pommel -->
    <rect x="238" y="296" width="36" height="24" fill="#39FF14" rx="2"/>
  </g>

  <!-- Pixel shield beside sword -->
  <g opacity="0.5">
    <rect x="340" y="140" width="20" height="20" fill="#39FF14" opacity="0.4"/>
    <rect x="360" y="140" width="20" height="20" fill="#39FF14" opacity="0.5"/>
    <rect x="380" y="140" width="20" height="20" fill="#39FF14" opacity="0.4"/>
    <rect x="330" y="160" width="20" height="20" fill="#39FF14" opacity="0.5"/>
    <rect x="350" y="160" width="20" height="20" fill="#39FF14" opacity="0.7"/>
    <rect x="370" y="160" width="20" height="20" fill="#39FF14" opacity="0.7"/>
    <rect x="390" y="160" width="20" height="20" fill="#39FF14" opacity="0.5"/>
    <rect x="330" y="180" width="20" height="20" fill="#39FF14" opacity="0.5"/>
    <rect x="350" y="180" width="20" height="20" fill="#39FF14" opacity="0.6"/>
    <rect x="370" y="180" width="20" height="20" fill="#39FF14" opacity="0.6"/>
    <rect x="390" y="180" width="20" height="20" fill="#39FF14" opacity="0.5"/>
    <rect x="340" y="200" width="20" height="20" fill="#39FF14" opacity="0.4"/>
    <rect x="360" y="200" width="20" height="20" fill="#39FF14" opacity="0.5"/>
    <rect x="380" y="200" width="20" height="20" fill="#39FF14" opacity="0.4"/>
    <rect x="360" y="220" width="20" height="20" fill="#39FF14" opacity="0.3"/>
  </g>

  <!-- Scattered pixels -->
  <g fill="#39FF14" opacity="0.3">
    <rect x="100" y="120" width="12" height="12"/>
    <rect x="140" y="300" width="10" height="10"/>
    <rect x="400" y="300" width="14" height="14"/>
    <rect x="80" y="240" width="8" height="8"/>
    <rect x="420" y="100" width="10" height="10"/>
    <rect x="380" y="280" width="8" height="8"/>
  </g>

  <!-- Divider -->
  <g filter="url(#pl-glow)" opacity="0.5">
    <rect x="120" y="355" width="16" height="4" fill="#39FF14"/>
    <rect x="148" y="355" width="16" height="4" fill="#39FF14"/>
    <rect x="176" y="355" width="16" height="4" fill="#39FF14"/>
    <rect x="204" y="355" width="16" height="4" fill="#39FF14"/>
    <rect x="232" y="355" width="48" height="4" fill="#39FF14"/>
    <rect x="292" y="355" width="16" height="4" fill="#39FF14"/>
    <rect x="320" y="355" width="16" height="4" fill="#39FF14"/>
    <rect x="348" y="355" width="16" height="4" fill="#39FF14"/>
    <rect x="376" y="355" width="16" height="4" fill="#39FF14"/>
  </g>

  <!-- Game title -->
  <text x="256" y="410" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-weight="900" font-size="50" fill="#39FF14" filter="url(#pl-glow)" letter-spacing="2">PIXEL</text>
  <text x="256" y="465" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-weight="900" font-size="42" fill="#c0ffc0" letter-spacing="6">LEGENDS</text>
</svg>