<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="pls1-sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0A0A0F"/>
      <stop offset="100%" stop-color="#0a1a0a"/>
    </linearGradient>
    <filter id="pls1-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#pls1-sky)"/>

  <!-- Grid overlay -->
  <g stroke="#39FF14" stroke-width="0.5" opacity="0.06">
    <line x1="0" y1="0" x2="0" y2="720"/><line x1="40" y1="0" x2="40" y2="720"/>
    <line x1="80" y1="0" x2="80" y2="720"/><line x1="120" y1="0" x2="120" y2="720"/>
    <line x1="160" y1="0" x2="160" y2="720"/><line x1="200" y1="0" x2="200" y2="720"/>
    <line x1="240" y1="0" x2="240" y2="720"/><line x1="280" y1="0" x2="280" y2="720"/>
    <line x1="320" y1="0" x2="320" y2="720"/><line x1="360" y1="0" x2="360" y2="720"/>
    <line x1="400" y1="0" x2="400" y2="720"/><line x1="440" y1="0" x2="440" y2="720"/>
    <line x1="480" y1="0" x2="480" y2="720"/><line x1="520" y1="0" x2="520" y2="720"/>
    <line x1="560" y1="0" x2="560" y2="720"/><line x1="600" y1="0" x2="600" y2="720"/>
    <line x1="640" y1="0" x2="640" y2="720"/><line x1="680" y1="0" x2="680" y2="720"/>
    <line x1="720" y1="0" x2="720" y2="720"/><line x1="760" y1="0" x2="760" y2="720"/>
    <line x1="800" y1="0" x2="800" y2="720"/><line x1="840" y1="0" x2="840" y2="720"/>
    <line x1="880" y1="0" x2="880" y2="720"/><line x1="920" y1="0" x2="920" y2="720"/>
    <line x1="960" y1="0" x2="960" y2="720"/><line x1="1000" y1="0" x2="1000" y2="720"/>
    <line x1="0" y1="40" x2="1280" y2="40"/><line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="120" x2="1280" y2="120"/><line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="200" x2="1280" y2="200"/><line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="280" x2="1280" y2="280"/><line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="360" x2="1280" y2="360"/><line x1="0" y1="400" x2="1280" y2="400"/>
    <line x1="0" y1="440" x2="1280" y2="440"/><line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="520" x2="1280" y2="520"/><line x1="0" y1="560" x2="1280" y2="560"/>
    <line x1="0" y1="600" x2="1280" y2="600"/><line x1="0" y1="640" x2="1280" y2="640"/>
    <line x1="0" y1="680" x2="1280" y2="680"/>
  </g>

  <!-- Ground / terrain -->
  <rect x="0" y="520" width="1280" height="200" fill="#0a120a"/>

  <!-- Grass blocks (pixel style) -->
  <g fill="#1a3a0a">
    <rect x="0" y="520" width="40" height="40"/><rect x="40" y="520" width="40" height="40"/>
    <rect x="80" y="520" width="40" height="40"/><rect x="120" y="520" width="40" height="40"/>
    <rect x="160" y="520" width="40" height="40"/><rect x="200" y="520" width="40" height="40"/>
    <rect x="240" y="520" width="40" height="40"/><rect x="280" y="520" width="40" height="40"/>
    <rect x="320" y="520" width="40" height="40"/><rect x="360" y="520" width="40" height="40"/>
    <rect x="400" y="520" width="40" height="40"/><rect x="440" y="520" width="40" height="40"/>
    <rect x="480" y="520" width="40" height="40"/><rect x="520" y="520" width="40" height="40"/>
    <rect x="560" y="520" width="40" height="40"/><rect x="600" y="520" width="40" height="40"/>
    <rect x="640" y="520" width="40" height="40"/><rect x="680" y="520" width="40" height="40"/>
    <rect x="720" y="520" width="40" height="40"/><rect x="760" y="520" width="40" height="40"/>
    <rect x="800" y="520" width="40" height="40"/><rect x="840" y="520" width="40" height="40"/>
    <rect x="880" y="520" width="40" height="40"/><rect x="920" y="520" width="40" height="40"/>
    <rect x="960" y="520" width="40" height="40"/><rect x="1000" y="520" width="40" height="40"/>
    <rect x="1040" y="520" width="40" height="40"/><rect x="1080" y="520" width="40" height="40"/>
    <rect x="1120" y="520" width="40" height="40"/><rect x="1160" y="520" width="40" height="40"/>
    <rect x="1200" y="520" width="40" height="40"/><rect x="1240" y="520" width="40" height="40"/>
  </g>
  <!-- Grass top highlight -->
  <g fill="#39FF14" opacity="0.3">
    <rect x="0" y="520" width="40" height="4"/><rect x="40" y="520" width="40" height="4"/>
    <rect x="80" y="520" width="40" height="4"/><rect x="120" y="520" width="40" height="4"/>
    <rect x="160" y="520" width="40" height="4"/><rect x="200" y="520" width="40" height="4"/>
    <rect x="240" y="520" width="40" height="4"/><rect x="280" y="520" width="40" height="4"/>
    <rect x="320" y="520" width="40" height="4"/><rect x="360" y="520" width="40" height="4"/>
    <rect x="400" y="520" width="40" height="4"/><rect x="440" y="520" width="40" height="4"/>
    <rect x="480" y="520" width="40" height="4"/><rect x="520" y="520" width="40" height="4"/>
    <rect x="560" y="520" width="40" height="4"/><rect x="600" y="520" width="40" height="4"/>
    <rect x="640" y="520" width="40" height="4"/><rect x="680" y="520" width="40" height="4"/>
    <rect x="720" y="520" width="40" height="4"/><rect x="760" y="520" width="40" height="4"/>
    <rect x="800" y="520" width="40" height="4"/><rect x="840" y="520" width="40" height="4"/>
    <rect x="880" y="520" width="40" height="4"/><rect x="920" y="520" width="40" height="4"/>
    <rect x="960" y="520" width="40" height="4"/><rect x="1000" y="520" width="40" height="4"/>
    <rect x="1040" y="520" width="40" height="4"/><rect x="1080" y="520" width="40" height="4"/>
    <rect x="1120" y="520" width="40" height="4"/><rect x="1160" y="520" width="40" height="4"/>
    <rect x="1200" y="520" width="40" height="4"/><rect x="1240" y="520" width="40" height="4"/>
  </g>

  <!-- Base - Main building (castle/headquarters) -->
  <g>
    <!-- Castle body -->
    <rect x="200" y="320" width="240" height="200" fill="#1a2a1a" stroke="#39FF14" stroke-width="1" opacity="0.8"/>
    <!-- Towers -->
    <rect x="180" y="280" width="40" height="240" fill="#1a2a1a" stroke="#39FF14" stroke-width="1" opacity="0.8"/>
    <rect x="420" y="280" width="40" height="240" fill="#1a2a1a" stroke="#39FF14" stroke-width="1" opacity="0.8"/>
    <!-- Tower tops -->
    <polygon points="180,280 200,240 220,280" fill="#39FF14" opacity="0.4"/>
    <polygon points="420,280 440,240 460,280" fill="#39FF14" opacity="0.4"/>
    <!-- Gate -->
    <rect x="280" y="420" width="80" height="100" rx="40" fill="#0A0A0F" stroke="#39FF14" stroke-width="1.5"/>
    <!-- Windows -->
    <rect x="230" y="350" width="24" height="30" fill="#39FF14" opacity="0.2"/>
    <rect x="386" y="350" width="24" height="30" fill="#39FF14" opacity="0.2"/>
    <rect x="230" y="400" width="24" height="30" fill="#39FF14" opacity="0.15"/>
    <rect x="386" y="400" width="24" height="30" fill="#39FF14" opacity="0.15"/>
    <!-- Flag -->
    <line x1="320" y1="230" x2="320" y2="320" stroke="#39FF14" stroke-width="2"/>
    <polygon points="320,230 360,245 320,260" fill="#39FF14" opacity="0.6"/>
  </g>

  <!-- Barracks building -->
  <g>
    <rect x="520" y="400" width="160" height="120" fill="#1a2a1a" stroke="#39FF14" stroke-width="1" opacity="0.7"/>
    <polygon points="520,400 600,360 680,400" fill="#1a2a1a" stroke="#39FF14" stroke-width="1" opacity="0.7"/>
    <rect x="570" y="440" width="40" height="80" fill="#0A0A0F" stroke="#39FF14" stroke-width="1"/>
    <text x="600" y="385" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#39FF14" opacity="0.6">BARRACKS</text>
  </g>

  <!-- Resource building -->
  <g>
    <rect x="740" y="420" width="120" height="100" fill="#1a2a1a" stroke="#39FF14" stroke-width="1" opacity="0.7"/>
    <rect x="740" y="410" width="120" height="15" fill="#39FF14" opacity="0.2"/>
    <rect x="770" y="460" width="30" height="30" fill="#39FF14" opacity="0.15"/>
    <rect x="810" y="460" width="30" height="30" fill="#39FF14" opacity="0.15"/>
    <text x="800" y="408" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#39FF14" opacity="0.6">MINE</text>
  </g>

  <!-- Wall segments -->
  <g fill="#0f1f0f" stroke="#39FF14" stroke-width="1" opacity="0.5">
    <rect x="100" y="490" width="80" height="30"/>
    <rect x="460" y="490" width="60" height="30"/>
    <rect x="860" y="490" width="80" height="30"/>
  </g>

  <!-- Pixel units (small squares representing troops) -->
  <g fill="#39FF14" filter="url(#pls1-glow)">
    <rect x="500" y="500" width="8" height="12"/><rect x="515" y="500" width="8" height="12"/>
    <rect x="530" y="500" width="8" height="12"/><rect x="545" y="500" width="8" height="12"/>
    <rect x="650" y="505" width="8" height="12"/><rect x="665" y="505" width="8" height="12"/>
    <rect x="680" y="505" width="8" height="12"/>
  </g>

  <!-- Resource HUD top -->
  <rect x="0" y="0" width="1280" height="50" fill="#0A0A0F" opacity="0.9"/>
  <g font-family="'Courier New', monospace" font-size="14">
    <text x="50" y="32" fill="#ffdd00">&#x25C9; 12,450</text>
    <text x="200" y="32" fill="#39FF14">&#x25B2; 8,230</text>
    <text x="350" y="32" fill="#888">&#x25A0; 3,100</text>
    <text x="500" y="32" fill="#ff6666">&#x2694; 45 / 80</text>
  </g>

  <!-- Build menu button -->
  <g transform="translate(1100, 8)">
    <rect x="0" y="0" width="140" height="36" rx="6" fill="#39FF14" opacity="0.2" stroke="#39FF14" stroke-width="1.5"/>
    <text x="70" y="24" text-anchor="middle" font-family="'Courier New', monospace" font-weight="700" font-size="14" fill="#39FF14">+ BUILD</text>
  </g>

  <!-- Minimap bottom right -->
  <g transform="translate(1080, 540)">
    <rect x="0" y="0" width="170" height="140" rx="8" fill="#0A0A0F" opacity="0.8" stroke="#39FF14" stroke-width="1.5"/>
    <rect x="10" y="10" width="150" height="120" fill="#0a120a"/>
    <!-- Terrain blocks on minimap -->
    <rect x="50" y="40" width="30" height="30" fill="#39FF14" opacity="0.3"/>
    <rect x="90" y="60" width="15" height="15" fill="#39FF14" opacity="0.2"/>
    <rect x="30" y="80" width="10" height="10" fill="#39FF14" opacity="0.2"/>
    <!-- View area -->
    <rect x="40" y="35" width="60" height="40" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Day counter -->
  <g transform="translate(1100, 490)">
    <rect x="0" y="0" width="140" height="35" rx="6" fill="#0A0A0F" opacity="0.8" stroke="#39FF14" stroke-width="1"/>
    <text x="70" y="23" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" fill="#39FF14">DAY 47</text>
  </g>
</svg>