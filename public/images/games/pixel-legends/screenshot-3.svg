<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="pls3-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0A0A0F"/>
      <stop offset="100%" stop-color="#0a100a"/>
    </linearGradient>
    <filter id="pls3-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="url(#pls3-bg)"/>

  <!-- Tech Tree / Research Screen -->

  <!-- Header -->
  <rect x="0" y="0" width="1280" height="55" fill="#0A0A0F" opacity="0.9"/>
  <text x="640" y="38" text-anchor="middle" font-family="'Courier New', monospace" font-weight="900" font-size="24" fill="#39FF14" filter="url(#pls3-glow)" letter-spacing="3">RESEARCH LAB</text>

  <!-- Research points -->
  <g transform="translate(1050, 12)">
    <rect x="0" y="0" width="180" height="32" rx="4" fill="#0a150a" stroke="#39FF14" stroke-width="1"/>
    <text x="15" y="22" font-family="'Courier New', monospace" font-size="14" fill="#39FF14">&#x25C6; 2,340 RP</text>
  </g>

  <!-- Tech tree grid -->
  <!-- Era 1 - Basic -->
  <g transform="translate(60, 90)">
    <text x="0" y="20" font-family="'Courier New', monospace" font-size="14" fill="#39FF14" opacity="0.5">ERA I - FOUNDATIONS</text>

    <!-- Completed nodes -->
    <g transform="translate(0, 40)">
      <rect x="0" y="0" width="160" height="90" rx="8" fill="#1a2a1a" stroke="#39FF14" stroke-width="2"/>
      <rect x="0" y="0" width="160" height="20" rx="8" fill="#39FF14" opacity="0.15"/>
      <text x="80" y="15" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#39FF14">COMPLETED</text>
      <text x="80" y="50" text-anchor="middle" font-family="'Courier New', monospace" font-weight="700" font-size="13" fill="#FFFFFF">Basic Walls</text>
      <text x="80" y="70" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#39FF14">DEF +20%</text>
    </g>

    <g transform="translate(0, 150)">
      <rect x="0" y="0" width="160" height="90" rx="8" fill="#1a2a1a" stroke="#39FF14" stroke-width="2"/>
      <rect x="0" y="0" width="160" height="20" rx="8" fill="#39FF14" opacity="0.15"/>
      <text x="80" y="15" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#39FF14">COMPLETED</text>
      <text x="80" y="50" text-anchor="middle" font-family="'Courier New', monospace" font-weight="700" font-size="13" fill="#FFFFFF">Iron Mining</text>
      <text x="80" y="70" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#39FF14">PROD +15%</text>
    </g>

    <g transform="translate(0, 260)">
      <rect x="0" y="0" width="160" height="90" rx="8" fill="#1a2a1a" stroke="#39FF14" stroke-width="2"/>
      <rect x="0" y="0" width="160" height="20" rx="8" fill="#39FF14" opacity="0.15"/>
      <text x="80" y="15" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#39FF14">COMPLETED</text>
      <text x="80" y="50" text-anchor="middle" font-family="'Courier New', monospace" font-weight="700" font-size="13" fill="#FFFFFF">Recruit I</text>
      <text x="80" y="70" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#39FF14">+10 UNITS</text>
    </g>
  </g>

  <!-- Connecting lines -->
  <g stroke="#39FF14" stroke-width="2" opacity="0.4">
    <line x1="220" y1="175" x2="320" y2="175"/>
    <line x1="220" y1="285" x2="320" y2="285"/>
    <line x1="220" y1="395" x2="320" y2="395"/>
    <line x1="220" y1="175" x2="320" y2="285"/>
    <line x1="220" y1="285" x2="320" y2="175"/>
  </g>

  <!-- Era 2 - Intermediate -->
  <g transform="translate(320, 90)">
    <text x="0" y="20" font-family="'Courier New', monospace" font-size="14" fill="#39FF14" opacity="0.5">ERA II - EXPANSION</text>

    <g transform="translate(0, 40)">
      <rect x="0" y="0" width="160" height="90" rx="8" fill="#1a2a1a" stroke="#39FF14" stroke-width="2"/>
      <rect x="0" y="0" width="160" height="20" rx="8" fill="#39FF14" opacity="0.15"/>
      <text x="80" y="15" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#39FF14">COMPLETED</text>
      <text x="80" y="50" text-anchor="middle" font-family="'Courier New', monospace" font-weight="700" font-size="13" fill="#FFFFFF">Stone Walls</text>
      <text x="80" y="70" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#39FF14">DEF +40%</text>
    </g>

    <!-- Currently researching -->
    <g transform="translate(0, 150)">
      <rect x="0" y="0" width="160" height="90" rx="8" fill="#1a2a1a" stroke="#ffaa00" stroke-width="2">
        <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
      </rect>
      <rect x="0" y="0" width="160" height="20" rx="8" fill="#ffaa00" opacity="0.15"/>
      <text x="80" y="15" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#ffaa00">RESEARCHING...</text>
      <text x="80" y="50" text-anchor="middle" font-family="'Courier New', monospace" font-weight="700" font-size="13" fill="#FFFFFF">Steel Forge</text>
      <text x="80" y="70" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#ffaa00">ATK +25%</text>
      <!-- Progress bar -->
      <rect x="10" y="78" width="140" height="6" rx="2" fill="#1a1a0a"/>
      <rect x="10" y="78" width="90" height="6" rx="2" fill="#ffaa00" opacity="0.7"/>
    </g>

    <g transform="translate(0, 260)">
      <rect x="0" y="0" width="160" height="90" rx="8" fill="#1a1a2e" stroke="#555" stroke-width="1.5"/>
      <text x="80" y="50" text-anchor="middle" font-family="'Courier New', monospace" font-weight="700" font-size="13" fill="#666">Recruit II</text>
      <text x="80" y="70" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#555">+20 UNITS</text>
      <text x="80" y="15" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#555">800 RP</text>
    </g>
  </g>

  <!-- More connecting lines -->
  <g stroke="#39FF14" stroke-width="2" opacity="0.3">
    <line x1="480" y1="175" x2="580" y2="175"/>
    <line x1="480" y1="285" x2="580" y2="285"/>
    <line x1="480" y1="395" x2="580" y2="285"/>
  </g>
  <g stroke="#555" stroke-width="1" opacity="0.3" stroke-dasharray="5 5">
    <line x1="480" y1="395" x2="580" y2="395"/>
    <line x1="480" y1="175" x2="580" y2="285"/>
  </g>

  <!-- Era 3 - Advanced (locked) -->
  <g transform="translate(580, 90)">
    <text x="0" y="20" font-family="'Courier New', monospace" font-size="14" fill="#555">ERA III - DOMINION</text>

    <g transform="translate(0, 40)" opacity="0.5">
      <rect x="0" y="0" width="160" height="90" rx="8" fill="#121218" stroke="#555" stroke-width="1"/>
      <text x="80" y="50" text-anchor="middle" font-family="'Courier New', monospace" font-weight="700" font-size="13" fill="#555">Fortifications</text>
      <text x="80" y="70" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#444">DEF +80%</text>
      <text x="80" y="15" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#444">1,500 RP</text>
    </g>

    <g transform="translate(0, 150)" opacity="0.5">
      <rect x="0" y="0" width="160" height="90" rx="8" fill="#121218" stroke="#555" stroke-width="1"/>
      <text x="80" y="50" text-anchor="middle" font-family="'Courier New', monospace" font-weight="700" font-size="13" fill="#555">War Machines</text>
      <text x="80" y="70" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#444">SIEGE UNITS</text>
      <text x="80" y="15" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#444">2,000 RP</text>
    </g>

    <g transform="translate(0, 260)" opacity="0.5">
      <rect x="0" y="0" width="160" height="90" rx="8" fill="#121218" stroke="#555" stroke-width="1"/>
      <text x="80" y="50" text-anchor="middle" font-family="'Courier New', monospace" font-weight="700" font-size="13" fill="#555">Recruit III</text>
      <text x="80" y="70" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#444">+40 UNITS</text>
      <text x="80" y="15" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#444">1,800 RP</text>
    </g>
  </g>

  <!-- Era 4 (locked) -->
  <g transform="translate(840, 90)" opacity="0.3">
    <text x="0" y="20" font-family="'Courier New', monospace" font-size="14" fill="#333">ERA IV - LEGEND</text>

    <g transform="translate(0, 40)">
      <rect x="0" y="0" width="160" height="90" rx="8" fill="#0f0f12" stroke="#333" stroke-width="1"/>
      <text x="80" y="45" text-anchor="middle" font-family="'Courier New', monospace" font-size="24" fill="#333">?</text>
    </g>
    <g transform="translate(0, 150)">
      <rect x="0" y="0" width="160" height="90" rx="8" fill="#0f0f12" stroke="#333" stroke-width="1"/>
      <text x="80" y="45" text-anchor="middle" font-family="'Courier New', monospace" font-size="24" fill="#333">?</text>
    </g>
    <g transform="translate(0, 260)">
      <rect x="0" y="0" width="160" height="90" rx="8" fill="#0f0f12" stroke="#333" stroke-width="1"/>
      <text x="80" y="45" text-anchor="middle" font-family="'Courier New', monospace" font-size="24" fill="#333">?</text>
    </g>
  </g>

  <!-- Dashed lines to era 4 -->
  <g stroke="#333" stroke-width="1" opacity="0.3" stroke-dasharray="5 5">
    <line x1="740" y1="175" x2="840" y2="175"/>
    <line x1="740" y1="285" x2="840" y2="285"/>
    <line x1="740" y1="395" x2="840" y2="395"/>
  </g>

  <!-- Selected node detail panel -->
  <g transform="translate(60, 500)">
    <rect x="0" y="0" width="500" height="160" rx="10" fill="#0A0A0F" opacity="0.9" stroke="#ffaa00" stroke-width="1.5"/>
    <text x="20" y="30" font-family="'Courier New', monospace" font-weight="900" font-size="18" fill="#ffaa00">STEEL FORGE</text>
    <text x="20" y="50" font-family="'Courier New', monospace" font-size="12" fill="#888">Advanced metalworking for stronger weapons</text>
    <line x1="20" y1="60" x2="480" y2="60" stroke="#ffaa00" stroke-width="0.5" opacity="0.3"/>
    <text x="20" y="80" font-family="'Courier New', monospace" font-size="13" fill="#39FF14">+ All melee units gain +25% ATK</text>
    <text x="20" y="100" font-family="'Courier New', monospace" font-size="13" fill="#39FF14">+ Unlock: Heavy Infantry unit</text>
    <text x="20" y="120" font-family="'Courier New', monospace" font-size="13" fill="#888">Cost: 1,200 RP | Time: 45 turns</text>
    <!-- Progress -->
    <text x="20" y="146" font-family="'Courier New', monospace" font-size="12" fill="#ffaa00">Progress: 64% (29 / 45 turns)</text>
  </g>

  <!-- Cancel / Speed up buttons -->
  <g transform="translate(600, 600)">
    <rect x="0" y="0" width="140" height="40" rx="6" fill="#ffaa00" opacity="0.2" stroke="#ffaa00" stroke-width="1.5"/>
    <text x="70" y="26" text-anchor="middle" font-family="'Courier New', monospace" font-weight="700" font-size="12" fill="#ffaa00">SPEED UP (500g)</text>
  </g>
  <g transform="translate(760, 600)">
    <rect x="0" y="0" width="100" height="40" rx="6" fill="#0A0A0F" stroke="#ff3333" stroke-width="1"/>
    <text x="50" y="26" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#ff3333">CANCEL</text>
  </g>

  <!-- Bottom nav -->
  <rect x="0" y="670" width="1280" height="50" fill="#0A0A0F" opacity="0.9"/>
  <g font-family="'Courier New', monospace" font-size="12" fill="#555">
    <text x="160" y="700" text-anchor="middle">BASE</text>
    <text x="400" y="700" text-anchor="middle">ARMY</text>
    <text x="640" y="700" text-anchor="middle" fill="#39FF14">RESEARCH</text>
    <text x="880" y="700" text-anchor="middle">WORLD</text>
    <text x="1100" y="700" text-anchor="middle">ALLIANCE</text>
  </g>
  <rect x="605" y="690" width="70" height="3" rx="1" fill="#39FF14"/>
</svg>