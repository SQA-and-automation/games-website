<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="sq-bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1a1030"/>
      <stop offset="100%" stop-color="#0A0A0F"/>
    </radialGradient>
    <radialGradient id="sq-orb" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c4a0ff"/>
      <stop offset="40%" stop-color="#7B61FF"/>
      <stop offset="100%" stop-color="#3a1a8a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sq-accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a78bff"/>
      <stop offset="100%" stop-color="#7B61FF"/>
    </linearGradient>
    <filter id="sq-glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="sq-soft-glow">
      <feGaussianBlur stdDeviation="15"/>
    </filter>
    <filter id="sq-shadow">
      <feGaussianBlur stdDeviation="3"/>
      <feOffset dx="0" dy="4"/>
    </filter>
    <clipPath id="sq-round">
      <rect width="512" height="512" rx="80"/>
    </clipPath>
  </defs>

  <g clip-path="url(#sq-round)">
    <!-- Background -->
    <rect width="512" height="512" fill="url(#sq-bg)"/>

    <!-- Ambient glow -->
    <circle cx="256" cy="200" r="180" fill="#7B61FF" opacity="0.08" filter="url(#sq-soft-glow)"/>

    <!-- Dark energy swirls -->
    <g opacity="0.2" stroke="#7B61FF" fill="none" stroke-width="1.5">
      <ellipse cx="256" cy="220" rx="160" ry="80" transform="rotate(-15 256 220)"/>
      <ellipse cx="256" cy="220" rx="130" ry="65" transform="rotate(10 256 220)"/>
      <ellipse cx="256" cy="220" rx="100" ry="50" transform="rotate(-5 256 220)"/>
    </g>

    <!-- Shadow/magic orb -->
    <circle cx="256" cy="200" r="90" fill="url(#sq-orb)" filter="url(#sq-glow)"/>
    <circle cx="256" cy="200" r="60" fill="#0A0A0F" opacity="0.6"/>

    <!-- Eye shape in center of orb -->
    <g filter="url(#sq-glow)">
      <ellipse cx="256" cy="200" rx="40" ry="20" fill="none" stroke="#7B61FF" stroke-width="2.5"/>
      <circle cx="256" cy="200" r="10" fill="#c4a0ff"/>
      <circle cx="256" cy="200" r="4" fill="#ffffff"/>
    </g>

    <!-- Floating rune symbols -->
    <g filter="url(#sq-glow)" opacity="0.6">
      <!-- Left rune -->
      <g transform="translate(120, 180)">
        <polygon points="0,-20 12,10 -12,10" fill="none" stroke="#7B61FF" stroke-width="2"/>
        <line x1="0" y1="-20" x2="0" y2="16" stroke="#7B61FF" stroke-width="1.5"/>
      </g>
      <!-- Right rune -->
      <g transform="translate(392, 180)">
        <rect x="-12" y="-15" width="24" height="30" fill="none" stroke="#7B61FF" stroke-width="2" rx="2"/>
        <line x1="-8" y1="0" x2="8" y2="0" stroke="#7B61FF" stroke-width="1.5"/>
        <line x1="0" y1="-10" x2="0" y2="10" stroke="#7B61FF" stroke-width="1.5"/>
      </g>
      <!-- Top rune -->
      <g transform="translate(256, 80)">
        <circle cx="0" cy="0" r="14" fill="none" stroke="#7B61FF" stroke-width="2"/>
        <line x1="-10" y1="-10" x2="10" y2="10" stroke="#7B61FF" stroke-width="1.5"/>
        <line x1="10" y1="-10" x2="-10" y2="10" stroke="#7B61FF" stroke-width="1.5"/>
      </g>
    </g>

    <!-- Particles -->
    <g fill="#7B61FF" opacity="0.5">
      <circle cx="180" cy="130" r="2"/>
      <circle cx="340" cy="140" r="1.5"/>
      <circle cx="150" cy="260" r="1.8"/>
      <circle cx="370" cy="250" r="2.2"/>
      <circle cx="200" cy="100" r="1.2"/>
      <circle cx="310" cy="110" r="1.6"/>
      <circle cx="130" cy="200" r="1"/>
      <circle cx="390" cy="200" r="1.4"/>
    </g>

    <!-- Divider line -->
    <line x1="120" y1="340" x2="392" y2="340" stroke="#7B61FF" stroke-width="2" opacity="0.4"/>
    <circle cx="256" cy="340" r="4" fill="#7B61FF" opacity="0.6"/>

    <!-- Game title -->
    <text x="256" y="400" text-anchor="middle" font-family="Georgia, Times, serif" font-weight="700" font-size="50" fill="url(#sq-accent)" filter="url(#sq-glow)" letter-spacing="3">SHADOW</text>
    <text x="256" y="455" text-anchor="middle" font-family="Georgia, Times, serif" font-weight="700" font-size="42" fill="#e0d0ff" letter-spacing="6">QUEST</text>
  </g>
</svg>